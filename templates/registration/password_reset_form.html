{% extends 'base_auth.html' %}
{% load static %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-200 via-purple-100 to-orange-100 relative overflow-hidden px-4">
  <img src="{% static 'img/tagum.jpg' %}" alt="Cityscape" class="absolute inset-0 w-full h-full object-cover opacity-80 pointer-events-none z-0">

  <div class="relative z-10 w-full max-w-md bg-white/90 rounded-2xl shadow-2xl p-8">
    <h1 class="text-2xl font-bold text-blue-900 mb-2">Forgot Password</h1>
    <p class="text-sm text-gray-600 mb-6">
      Enter your account email and we will send a reset link.
    </p>

    {% if form.errors %}
      <div class="mb-4 rounded-lg border border-red-300 bg-red-50 px-4 py-3 text-sm text-red-700">
        Please enter a valid email address.
      </div>
    {% endif %}

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label for="id_email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
        <input
          id="id_email"
          type="email"
          name="email"
          required
          autofocus
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none"
          placeholder="you@email.com"
        >
      </div>
      <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 rounded-lg shadow transition">
        Send Reset Link
      </button>
    </form>

    <a href="{% url 'login' %}" class="mt-4 inline-block text-sm text-blue-700 hover:underline">
      Back to login
    </a>
  </div>
</div>
{% endblock %}
