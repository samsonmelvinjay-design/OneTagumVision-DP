<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Engineer Offline</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
            color: #111827;
        }
        .card {
            width: min(92vw, 420px);
            padding: 1.5rem;
            border-radius: 14px;
            background: #ffffff;
            box-shadow: 0 12px 36px rgba(17, 24, 39, 0.12);
            text-align: center;
        }
        h1 {
            margin: 0 0 0.6rem;
            font-size: 1.35rem;
        }
        p {
            margin: 0.4rem 0 1.2rem;
            line-height: 1.45;
        }
        a {
            display: inline-block;
            padding: 0.65rem 1rem;
            border-radius: 10px;
            text-decoration: none;
            background: #1f2937;
            color: #ffffff;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>You are currently offline</h1>
        <p>Project Engineer pages that were already opened may still work from cache.</p>
        <a href="/projeng/dashboard/">Retry Dashboard</a>
    </main>
</body>
</html>
