{% extends 'projeng_base.html' %}
{% block content %}
<div class="container mx-auto px-4 py-6 max-w-4xl">
    <div class="mb-6">
        <div class="flex items-center gap-4 mb-4">
            <a href="{% url 'projeng:projeng_project_detail' project.pk %}"
               class="text-gray-500 hover:text-gray-700 transition-colors duration-200 p-2 -ml-2 rounded-lg hover:bg-gray-100"
               title="Back to Project Details">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
            </a>
            <h1 class="text-3xl font-bold text-gray-900">Add Update</h1>
        </div>
        <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
            <p class="text-sm text-blue-900">
                <span class="font-semibold">Project:</span> {{ project.name }}
                {% if project.prn %}<span class="ml-4"><span class="font-semibold">PRN:</span> {{ project.prn }}</span>{% endif %}
            </p>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200">
        <div class="border-b border-gray-200 bg-blue-50 px-6 py-4">
            <div class="flex items-center justify-center gap-2 font-semibold text-blue-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
                <span>Progress Update</span>
            </div>
        </div>
        <div class="p-6">
            {% include 'projeng/partials/progress_update_form.html' with progress_form_variant='page' %}
        </div>
    </div>
</div>
{% endblock %}
